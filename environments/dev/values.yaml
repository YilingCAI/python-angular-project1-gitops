###############################################################################
# Dev environment overrides
# Image tags below are automatically updated by the CI/CD pipeline.
# DO NOT edit image tags manually — they will be overwritten on next deploy.
###############################################################################

global:
  registry: "209561932650.dkr.ecr.us-east-1.amazonaws.com"
  imagePullPolicy: Always
backend:
  image:
    repository: mypythonproject1/backend
    # ↓ Updated automatically by cd-eks-gitops.yml
    tag: "dev-9b847b5"
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
  env:
    - name: LOG_LEVEL
      value: "debug"
    - name: PORT
      value: "8000"
    - name: ENVIRONMENT
      value: "dev"
  secretsManager:
    # Disabled until Terraform secret ARNs are known (terraform output jwt_secret_arn, rds_secret_arn).
    # Re-enable and populate objects[] below after first `terraform apply`.
    enabled: false
    secretProviderClass: mypythonproject1-backend-secrets-dev
    objects: []
frontend:
  image:
    repository: mypythonproject1/frontend
    # ↓ Updated automatically by cd-eks-gitops.yml
    tag: "dev-9b847b5"
  replicaCount: 1
  autoscaling:
    enabled: false
  podDisruptionBudget:
    enabled: false
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-east-1:209561932650:certificate/REPLACE_WITH_DEV_CERT_ARN"
    alb.ingress.kubernetes.io/healthcheck-path: /health
  host: "app.dev.example.com" # replace with your dev domain
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::209561932650:role/mypythonproject1-dev-pod-role"

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1
