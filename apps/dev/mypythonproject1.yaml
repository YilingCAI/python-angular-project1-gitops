###############################################################################
# ArgoCD Application — dev
#
# Dev is fully automated: auto-sync, self-heal, auto-prune.
# Every commit to the develop branch triggers a new image build and
# updates environments/dev/values.yaml, ArgoCD picks it up immediately.
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mypythonproject1-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: mypythonproject1
    environment: dev
  annotations:
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: deployments
    notifications.argoproj.io/subscribe.on-health-degraded.slack: deployments
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/YilingCAI/python-angular-project1-gitops.git
    targetRevision: main
    path: charts/mypythonproject1
    helm:
      valueFiles:
        - ../../environments/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: mypythonproject1-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
  revisionHistoryLimit: 3
