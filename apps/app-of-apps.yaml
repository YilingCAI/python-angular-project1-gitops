###############################################################################
# ArgoCD App-of-Apps — Root Application
#
# Apply this ONCE to bootstrap all environments.
# ArgoCD will discover and create all child Applications under apps/.
#
# Usage:
#   kubectl apply -f apps/app-of-apps.yaml -n argocd
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-of-apps
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/YilingCAI/python-angular-project1-gitops.git
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
